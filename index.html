<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职称考试刷题 - 云同步版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#1a1a2e}
.app{max-width:750px;margin:0 auto;padding:20px;padding-bottom:80px}
.page{display:none}.page.active{display:block}
.h{text-align:center;padding:30px 0;color:#fff}
.h h1{font-size:2rem;margin-bottom:8px}
.h p{font-size:.9rem;opacity:.9}
.c{background:#fff;border-radius:20px;padding:25px;margin-bottom:15px;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.cr{display:flex;justify-content:space-around;text-align:center}
.n{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.l{font-size:.85rem;color:#666;margin-top:5px}
.cd{background:#fff;border-radius:16px;padding:20px;margin-bottom:12px;display:flex;align-items:center;box-shadow:0 10px 40px rgba(0,0,0,.1);cursor:pointer;transition:all .3s}
.cd:active{transform:scale(.98)}
.ci{width:55px;height:55px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-right:15px}
.econ{background:linear-gradient(135deg,#667eea,#764ba2)}
.aud{background:linear-gradient(135deg,#11998e,#38ef7d)}
.stat{background:linear-gradient(135deg,#eb3349,#f45c43)}
.cn{flex:1}
.cnt{font-size:1.1rem;font-weight:600}
.cd p{font-size:.8rem;color:#999}
.b{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:12px;transition:all .3s}
.b:active{opacity:.9;transform:scale(.98)}
.b2{background:#fff;color:#667eea;border:2px solid #667eea}
.b3{background:#ff6b6b;color:#fff;border:2px solid #ff6b6b}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:#fff}
.pi span{font-weight:700}
.si{background:rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;color:#fff;font-size:.85rem}
.pb{height:5px;background:rgba(255,255,255,.3);border-radius:3px;margin-bottom:18px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:3px;transition:width .5s}
.qc{background:#fff;border-radius:20px;padding:22px;box-shadow:0 10px 40px rgba(0,0,0,.1);margin-bottom:15px}
.qt{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:3px 10px;border-radius:20px;font-size:.7rem;margin-bottom:10px}
.q{font-size:1rem;line-height:1.7;margin-bottom:18px}
.src{font-size:.75rem;color:#999;background:#f5f5f5;padding:8px 12px;border-radius:8px;margin-bottom:12px}
.o{background:#f8f9fa;border:2px solid #e9ecef;border-radius:12px;padding:12px 15px;margin-bottom:10px;display:flex;align-items:center;cursor:pointer;transition:all .2s}
.o:active{transform:scale(.98)}
.o.sel{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}
.o.corr{background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff;border-color:transparent}
.o.wrong{background:linear-gradient(135deg,#eb3349,#f45c43);color:#fff;border-color:transparent}
.o.no{pointer-events:none}
.lb{width:30px;height:30px;border-radius:50%;background:#dee2e6;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.8rem;margin-right:10px;flex-shrink:0}
.o.sel .lb,.o.corr .lb,.o.wrong .lb{background:rgba(255,255,255,.3);color:#fff}
.ana{background:linear-gradient(135deg,#fff9c4,#fff59d);border-radius:12px;padding:15px;margin-top:15px;border-left:4px solid #ffc107}
.ana h4{font-size:.9rem;color:#f57c00;margin-bottom:8px}
.ana p{font-size:.85rem;color:#5d4037;line-height:1.6}
.tip{text-align:center;color:rgba(255,255,255,.8);padding:10px}
.rc{background:#fff;border-radius:20px;padding:30px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.1)}
.ri{font-size:4rem;margin-bottom:12px}
.rt{font-size:1.3rem;font-weight:600;margin-bottom:20px}
.sn{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sl{font-size:.9rem;color:#999;margin-top:8px}
.rs{display:flex;justify-content:space-around;margin:20px 0;padding:15px 0;border-top:1px solid #eee;border-bottom:1px solid #eee}
.rv{font-size:1.8rem;font-weight:700}
.rl{font-size:.8rem;color:#999;margin-top:5px}
.tab{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px 0;box-shadow:0 -5px 20px rgba(0,0,0,.1);max-width:750px;margin:0 auto}
.tabItem{display:flex;flex-direction:column;align-items:center;padding:8px 20px;color:#999;font-size:.65rem;cursor:pointer;transition:color .3s}
.tabItem.active{color:#667eea}
.tabIcon{font-size:1.4rem;margin-bottom:3px}
.badge{background:#ff6b6b;color:#fff;border-radius:10px;padding:2px 6px;font-size:.7rem;margin-left:5px}
.sync-info{background:rgba(255,255,255,.1);color:#fff;padding:10px;border-radius:8px;font-size:.8rem;margin-bottom:15px;text-align:center}
.user-info{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;font-size:.9rem}
.user-info input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin-top:8px}
</style>
</head>
<body>
<div class="app">
<div id="home" class="page active">
<div class="h"><h1>📚 职称考试刷题</h1><p>云同步版 - 多设备协作</p></div>
<div class="sync-info">✅ 云端同步 | 📱 多设备 | 🔐 本地存储</div>
<div class="c" id="stats">
<div class="cr">
<div><div class="n" id="tq">3000</div><div class="l">总题数</div></div>
<div><div class="n" id="aq">0</div><div class="l">已答题</div></div>
<div><div class="n" id="cr">0%</div><div class="l">正确率</div></div>
</div>
</div>
<div class="user-info">
<label>用户ID（可选，用于云同步）</label>
<input type="text" id="userId" placeholder="输入用户ID或邮箱" value="">
<button class="b" onclick="saveUserId()" style="margin-top:8px;padding:8px">保存用户ID</button>
</div>
<div id="cats">
<div class="cd" onclick="selCat('economist')"><div class="ci econ">📊</div><div class="cn"><div class="cnt">经济师</div><p>1000道题 | 单选600+多选300+判断100</p></div></div>
<div class="cd" onclick="selCat('auditor')"><div class="ci aud">📝</div><div class="cn"><div class="cnt">审计师</div><p>1000道题 | 单选600+多选300+判断100</p></div></div>
<div class="cd" onclick="selCat('statistician')"><div class="ci stat">📈</div><div class="cn"><div class="cnt">统计师</div><p>1000道题 | 单选600+多选300+判断100</p></div></div>
<button class="b" onclick="quickStart()">🎯 随机刷题</button>
<button class="b b3" onclick="startWrong()">📖 错题本<span class="badge" id="wrongCount">0</span></button>
<button class="b b2" onclick="exportData()">☁️ 导出数据</button>
</div>
</div>

<div id="quiz" class="page">
<div class="ph"><div class="pi"><span id="cn">1</span>/<span id="tn">100</span></div><div class="si">得分: <span id="sc">0</span></div></div>
<div class="pb"><div class="pf" id="pf" style="width:1%"></div></div>
<div class="qc">
<div class="qt" id="qt">单选题</div>
<div class="q" id="qd">加载中...</div>
<div class="src" id="src" style="display:none">📌 <span id="srcText"></span></div>
<div id="opts"></div>
<div class="ana" id="ana" style="display:none"><h4>💡 答案解析</h4><p id="anac"></p></div>
</div>
<div id="nbc">
<button class="b" id="confirmBtn" onclick="confirmMulti()" style="display:none">确认答案</button>
<button class="b" id="nb" onclick="nextQ()" style="display:none">下一题</button>
<div class="tip" id="tip">请选择答案</div>
</div>
</div>

<div id="wrongBook" class="page">
<div class="h"><h1>📖 错题本</h1></div>
<div id="wrongEmpty" style="display:none;background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff;text-align:center;padding:12px;border-radius:12px;margin-bottom:15px;font-size:.9rem">恭喜！错题已全部掌握 🎉</div>
<button class="b" onclick="startWrong()" id="startWrongBtn" style="display:none">开始复习错题</button>
<button class="b b2" onclick="goHome()">返回首页</button>
</div>

<div id="result" class="page">
<div class="rc">
<div class="ri" id="ric">🎉</div>
<div class="rt">答题完成！</div>
<div class="sn" id="fs">0</div><div class="sl">总得分</div>
<div class="rs">
<div><div class="rv" id="cc">0</div><div class="rl">答对</div></div>
<div><div class="rv" id="wc">0</div><div class="rl">答错</div></div>
<div><div class="rv" id="rc">0%</div><div class="rl">正确率</div></div>
</div>
<button class="b" onclick="retry()">再来一次</button>
<button class="b b2" onclick="goHome()">返回首页</button>
</div>
</div>

<div class="tab" id="tab" style="display:none">
<div class="tabItem" onclick="tab('home')"><span class="tabIcon">🏠</span>首页</div>
<div class="tabItem" onclick="tab('quiz')"><span class="tabIcon">📖</span>答题</div>
<div class="tabItem" onclick="tab('wrongBook')"><span class="tabIcon">📝</span>错题<span class="badge" id="tabWrongCount">0</span></div>
</div>
</div>

  his=JSON.parse(localStorage.getItem('h')||'[]');
  wrongBook=JSON.parse(localStorage.getItem('wb')||'[]');
  userId=localStorage.getItem('userId')||'';
  document.getElementById('userId').value=userId;
  const t=his.length,c=his.filter(x=>x.c).length;
  document.getElementById('aq').textContent=t;
  document.getElementById('cr').textContent=t>0?Math.round(c/t*100)+'%':'0%';
  document.getElementById('wrongCount').textContent=wrongBook.length;
  document.getElementById('tabWrongCount').textContent=wrongBook.length;
}

function saveUserId(){
  userId=document.getElementById('userId').value.trim();
  if(userId){
    localStorage.setItem('userId',userId);
    alert('用户ID已保存！\n其他设备登录后输入相同ID即可同步数据。');
  }
}

function exportData(){
  const data={userId,his,wrongBook,timestamp:new Date().toISOString()};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`quiz-data-${userId||'backup'}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function selCat(t){cur=t;isWrongMode=false;start();}
function quickStart(){const ts=['economist','auditor','statistician'];cur=ts[Math.floor(Math.random()*3)];isWrongMode=false;start();}

function buildQuiz(cat){
  const all=DATA[cat];
  const singles=all.filter(q=>q.type==='single').slice(0,60);
  const multis=all.filter(q=>q.type==='multi').slice(0,30);
  const tfs=all.filter(q=>q.type==='tf').slice(0,10);
  return [...singles,...multis,...tfs];
}

function start(){
  idx=0;score=0;done=false;selected=[];
  if(isWrongMode){
    qs=wrongBook.map(w=>w.q);
    total=qs.length;
  }else{
    qs=buildQuiz(cur);
    total=qs.length;
  }
  document.getElementById('tab').style.display='flex';
  show('quiz');
  loadQ();
}

function startWrong(){
  if(wrongBook.length===0){
    document.getElementById('wrongEmpty').style.display='block';
    document.getElementById('startWrongBtn').style.display='none';
  }else{
    document.getElementById('wrongEmpty').style.display='none';
    document.getElementById('startWrongBtn').style.display='block';
  }
  show('wrongBook');
}

function loadQ(){
  if(idx>=total){showResult();return;}
  const q=qs[idx];
  document.getElementById('cn').textContent=idx+1;
  document.getElementById('tn').textContent=total;
  document.getElementById('sc').textContent=score;
  document.getElementById('pf').style.width=((idx+1)/total*100)+'%';
  document.getElementById('qt').textContent=(isWrongMode?'错题复习 - ':'')+tn[cur]+' - '+types[q.type];
  document.getElementById('qd').textContent=q.q;
  if(q.source){
    document.getElementById('src').style.display='block';
    document.getElementById('srcText').textContent=q.source;
  }else{
    document.getElementById('src').style.display='none';
  }
  const oc=document.getElementById('opts');oc.innerHTML='';selected=[];
  const isMulti=q.type==='multi';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='o';
    d.innerHTML='<div class="lb">'+lb[i]+'</div><div style="flex:1">'+o+'</div>';
    d.onclick=function(){sel(i);};
    oc.appendChild(d);
  });
  document.getElementById('ana').style.display='none';
  document.getElementById('nb').style.display='none';
  document.getElementById('confirmBtn').style.display='none';
  document.getElementById('tip').style.display='block';
  document.getElementById('tip').textContent=isMulti?'多选题：请选择所有正确答案后点确认':'请选择答案';
  done=false;
}

function sel(i){
  if(done)return;
  const q=qs[idx];
  if(q.type==='multi'){
    const el=document.querySelectorAll('.o')[i];
    if(selected.includes(i)){selected=selected.filter(x=>x!==i);el.classList.remove('sel');}
    else{selected.push(i);el.classList.add('sel');}
    document.getElementById('confirmBtn').style.display='block';
    document.getElementById('tip').style.display='none';
  } else {
    done=true;selected=[i];checkAns(q,i);
  }
}

function confirmMulti(){
  if(selected.length===0){alert('请至少选择一个答案');return;}
  done=true;const q=qs[idx];checkAns(q,selected[0]);
}

function checkAns(q,i){
  let isCorrect;
  const correctArr=Array.isArray(q.a)?q.a:[q.a];
  if(q.type==='multi'){
    const s=selected.sort((a,b)=>a-b).join(',');
    const a=correctArr.sort((a,b)=>a-b).join(',');
    isCorrect=s===a;
    selected.forEach(si=>{const el=document.querySelectorAll('.o')[si];el.classList.add('no');el.classList.add(isCorrect?'corr':'wrong');});
    if(!isCorrect){correctArr.forEach(ai=>{if(!selected.includes(ai))document.querySelectorAll('.o')[ai].classList.add('corr');});}
  } else {
    isCorrect=i===q.a;
    document.querySelectorAll('.o').forEach((o,oi)=>{o.classList.add('no');if(oi===i)o.classList.add(isCorrect?'corr':'wrong');if(oi===q.a&&!isCorrect)o.classList.add('corr');});
  }
  if(isCorrect){
    score+=5;
    wrongBook=wrongBook.filter(w=>w.q!==q.q);
    localStorage.setItem('wb',JSON.stringify(wrongBook));
  } else {
    if(!wrongBook.some(w=>w.q===q.q)){
      wrongBook.push(q);
      localStorage.setItem('wb',JSON.stringify(wrongBook));
    }
  }
  document.getElementById('sc').textContent=score;
  his.push({q:q.q,s:lb[i],c:isCorrect,ty:cur,t:new Date().toISOString()});
  localStorage.setItem('h',JSON.stringify(his));
  const ansText=Array.isArray(q.a)?correctArr.map(x=>lb[x]).join(''):lb[q.a];
  document.getElementById('anac').innerHTML=(q.type==='multi'?'正确选项: ':'正确答案: ')+ansText+'<br><br>'+q.an;
  document.getElementById('ana').style.display='block';
  document.getElementById('confirmBtn').style.display='none';
  document.getElementById('tip').style.display='none';
  document.getElementById('nb').style.display='block';
  document.getElementById('nb').textContent=idx+1>=total?'查看结果':'下一题';
  up();
}

function nextQ(){idx++;loadQ();}

function showResult(){
  const cor=Math.floor(score/5),wro=total-cor,rat=Math.round(cor/total*100);
  document.getElementById('ric').textContent=rat>=80?'🎉':rat>=60?'👍':'💪';
  document.getElementById('fs').textContent=score;
  document.getElementById('cc').textContent=cor;
  document.getElementById('wc').textContent=wro;
  document.getElementById('rc').textContent=rat+'%';
  show('result');
}

function retry(){isWrongMode=false;start();}
function goHome(){up();show('home');}
function tab(p){if(p==='wrongBook'){startWrong();}else{show(p);}}

up();
</script>
</body>
</html>
