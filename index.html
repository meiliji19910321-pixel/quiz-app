let cur='economist',qs=[],idx=0,score=0,total=100,his=[],done=false,selected=[],wrongBook=[],isWrongMode=false;
const lb=['A','B','C','D','E','F'];
const types={'single':'单选题','multi':'多选题','tf':'判断题'};
const tn={'economist':'经济学','auditor':'审计学','statistician':'统计学'};

function up(){
  his=JSON.parse(localStorage.getItem('h')||'[]');
  wrongBook=JSON.parse(localStorage.getItem('wb')||'[]');
  const t=his.length,c=his.filter(x=>x.c).length;
  document.getElementById('aq').textContent=t;
  document.getElementById('cr').textContent=t>0?Math.round(c/t*100)+'%':'0%';
  document.getElementById('wrongCount').textContent=wrongBook.length;
  document.getElementById('tabWrongCount').textContent=wrongBook.length;
}

function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function selCat(t){cur=t;isWrongMode=false;start();}
function quickStart(){const ts=['economist','auditor','statistician'];cur=ts[Math.floor(Math.random()*3)];isWrongMode=false;start();}

function buildQuiz(cat){
  const all=DATA[cat];
  const singles=all.filter(q=>q.type==='single').slice(0,60);
  const multis=all.filter(q=>q.type==='multi').slice(0,30);
  const tfs=all.filter(q=>q.type==='tf').slice(0,10);
  return [...singles,...multis,...tfs];
}

function start(){
  idx=0;score=0;done=false;selected=[];
  if(isWrongMode){
    qs=wrongBook.map(w=>w.q);
    total=qs.length;
  }else{
    qs=buildQuiz(cur);
    total=qs.length;
  }
  document.getElementById('tab').style.display='flex';
  show('quiz');
  loadQ();
}

function startWrong(){
  if(wrongBook.length===0){
    document.getElementById('wrongEmpty').style.display='block';
    document.getElementById('startWrongBtn').style.display='none';
  }else{
    document.getElementById('wrongEmpty').style.display='none';
    document.getElementById('startWrongBtn').style.display='block';
  }
  show('wrongBook');
}

function loadQ(){
  if(idx>=total){showResult();return;}
  const q=qs[idx];
  document.getElementById('cn').textContent=idx+1;
  document.getElementById('tn').textContent=total;
  document.getElementById('sc').textContent=score;
  document.getElementById('pf').style.width=((idx+1)/total*100)+'%';
  document.getElementById('qt').textContent=(isWrongMode?'错题复习 - ':'')+tn[cur]+' - '+types[q.type];
  document.getElementById('qd').textContent=q.q;
  if(q.source){
    document.getElementById('src').style.display='block';
    document.getElementById('srcText').textContent=q.source;
  }else{
    document.getElementById('src').style.display='none';
  }
  const oc=document.getElementById('opts');oc.innerHTML='';selected=[];
  const isMulti=q.type==='multi';
  q.o.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='o';
    d.innerHTML='<div class="lb">'+lb[i]+'</div><div style="flex:1">'+o+'</div>';
    d.onclick=function(){sel(i);};
    oc.appendChild(d);
  });
  document.getElementById('ana').style.display='none';
  document.getElementById('nb').style.display='none';
  document.getElementById('confirmBtn').style.display='none';
  document.getElementById('tip').style.display='block';
  document.getElementById('tip').textContent=isMulti?'多选题：请选择所有正确答案后点确认':'请选择答案';
  done=false;
}

function sel(i){
  if(done)return;
  const q=qs[idx];
  if(q.type==='multi'){
    const el=document.querySelectorAll('.o')[i];
    if(selected.includes(i)){selected=selected.filter(x=>x!==i);el.classList.remove('sel');}
    else{selected.push(i);el.classList.add('sel');}
    document.getElementById('confirmBtn').style.display='block';
    document.getElementById('tip').style.display='none';
  } else {
    done=true;selected=[i];checkAns(q,i);
  }
}

function confirmMulti(){
  if(selected.length===0){alert('请至少选择一个答案');return;}
  done=true;const q=qs[idx];checkAns(q,selected[0]);
}

function checkAns(q,i){
  let isCorrect;
  const correctArr=Array.isArray(q.a)?q.a:[q.a];
  if(q.type==='multi'){
    const s=selected.sort((a,b)=>a-b).join(',');
    const a=correctArr.sort((a,b)=>a-b).join(',');
    isCorrect=s===a;
    selected.forEach(si=>{const el=document.querySelectorAll('.o')[si];el.classList.add('no');el.classList.add(isCorrect?'corr':'wrong');});
    if(!isCorrect){correctArr.forEach(ai=>{if(!selected.includes(ai))document.querySelectorAll('.o')[ai].classList.add('corr');});}
  } else {
    isCorrect=i===q.a;
    document.querySelectorAll('.o').forEach((o,oi)=>{o.classList.add('no');if(oi===i)o.classList.add(isCorrect?'corr':'wrong');if(oi===q.a&&!isCorrect)o.classList.add('corr');});
  }
  if(isCorrect){
    score+=5;
    wrongBook=wrongBook.filter(w=>w.q!==q.q);
    localStorage.setItem('wb',JSON.stringify(wrongBook));
  } else {
    if(!wrongBook.some(w=>w.q===q.q)){
      wrongBook.push(q);
      localStorage.setItem('wb',JSON.stringify(wrongBook));
    }
  }
  document.getElementById('sc').textContent=score;
  his.push({q:q.q,s:lb[i],c:isCorrect,ty:cur,t:new Date().toISOString()});
  localStorage.setItem('h',JSON.stringify(his));
  const ansText=Array.isArray(q.a)?correctArr.map(x=>lb[x]).join(''):lb[q.a];
  document.getElementById('anac').innerHTML=(q.type==='multi'?'正确选项: ':'正确答案: ')+ansText+'<br><br>'+q.an;
  document.getElementById('ana').style.display='block';
  document.getElementById('confirmBtn').style.display='none';
  document.getElementById('tip').style.display='none';
  document.getElementById('nb').style.display='block';
  document.getElementById('nb').textContent=idx+1>=total?'查看结果':'下一题';
  up();
}

function nextQ(){idx++;loadQ();}

function showResult(){
  const cor=Math.floor(score/5),wro=total-cor,rat=Math.round(cor/total*100);
  document.getElementById('ric').textContent=rat>=80?'🎉':rat>=60?'👍':'💪';
  document.getElementById('fs').textContent=score;
  document.getElementById('cc').textContent=cor;
  document.getElementById('wc').textContent=wro;
  document.getElementById('rc').textContent=rat+'%';
  show('result');
}

function retry(){isWrongMode=false;start();}
function goHome(){up();show('home');}
function tab(p){if(p==='wrongBook'){startWrong();}else{show(p);}}

up();
</script>
